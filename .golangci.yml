version: "2"

run:
  timeout: 15m

linters:
  settings:
    govet:
      enable:
        - nilness
    dupl:
      threshold: 100
    gocyclo:
      min-complexity: 50
    staticcheck:
      checks:
        - all
        - -QF1001
        - -QF1002
        - -QF1003 # ignore using underscores in Go names
        - -QF1008 # ignore omit embbed fields from selector expressions
        - -QF1012 # ignore use fmt.Fprintf instead of WriteString(fmt.Sprintf(...))
        - -ST* # disable all staticcheck style checks, we never ran these before
    modernize:
      disable:
        - omitzero # omitempty on struct fields is intentional in this codebase
  exclusions:
    paths:
      - .git
      - .tool
      - verify
      - pkg/plugins/buildifier
      - pkg/plugins/golint
    rules:
      - linters:
          - golint
        text: ".*should not use dot dot imports"
      - linters:
          - staticcheck
        # TODO: Is this really supposed to be deprecated? Ref https://github.com/kubernetes/test-infra/issues/14875
        text: "SA1019: t.*.TrustedOrg is deprecated: TrustedOrg functionality is deprecated and will be removed in January 2020"
  enable: # golangci-lint help linters
    - govet
    - unused
    - misspell
    - ineffassign
    - staticcheck
    - modernize # A suite of analyzers that suggest simplifications to Go code, using modern language and library features. https://golangci-lint.run/docs/linters/configuration/#modernize
  default: none
